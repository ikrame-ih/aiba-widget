<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#3d3535"/>

  <!-- Hair cap (top half over face) -->
  <path d="M 11 30 A 21 21 0 1 1 53 30 C 46 36 18 36 11 30 Z" fill="#191414"/>

  <!-- Face -->
  <circle cx="32" cy="33" r="21" fill="#f5f1e8"/>

  <!-- Brows -->
  <path d="M 20 27 Q 25 24 30 27" fill="none" stroke="#191414" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 34 27 Q 39 24 44 27" fill="none" stroke="#191414" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Eyes -->
  <path d="M 20 32 Q 25 29 30 32" fill="none" stroke="#191414" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M 34 32 Q 39 29 44 32" fill="none" stroke="#191414" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Cheeks -->
  <ellipse cx="23" cy="38" rx="5" ry="2.5" fill="#d8a090" opacity="0.35"/>
  <ellipse cx="41" cy="38" rx="5" ry="2.5" fill="#d8a090" opacity="0.35"/>

  <!-- Mouth -->
  <path d="M 29 43 Q 32 45.5 35 43" fill="none" stroke="#191414" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Beauty mark -->
  <circle cx="42" cy="39" r="1.2" fill="#191414"/>

  <!-- Kanzashi accent -->
  <line x1="32" y1="3" x2="32" y2="12" stroke="#c5a975" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="25" y1="5" x2="29" y2="12" stroke="#c5a975" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="39" y1="5" x2="35" y2="12" stroke="#c5a975" stroke-width="1.2" stroke-opacity="0.7"/>
</svg>
